<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crush Proposal Bot 💕</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="index-body">
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="index-container">
    <div class="glass-card index-card">
      <div class="envelope-wrap">
        <div class="envelope">
          <div class="envelope-flap"></div>
          <div class="envelope-heart">❤️</div>
        </div>
      </div>

      <h1 class="index-title">Crush Proposal Bot</h1>
      <p class="index-sub">Create beautiful romantic proposal pages<br>and share them with your crush 💌</p>

      <div class="index-steps">
        <div class="step-item">
          <span class="step-num">1</span>
          <span class="step-text">Open Telegram &amp; start the bot</span>
        </div>
        <div class="step-item">
          <span class="step-num">2</span>
          <span class="step-text">Use <strong>/create</strong> to make your page</span>
        </div>
        <div class="step-item">
          <span class="step-num">3</span>
          <span class="step-text">Share the link with your crush</span>
        </div>
        <div class="step-item">
          <span class="step-num">4</span>
          <span class="step-text">Get notified when they say Yes! 🎉</span>
        </div>
      </div>

      <a href="https://t.me/HeartFlowLove_Bot" class="btn-primary" target="_blank">
        Open in Telegram 💬
      </a>
    </div>
  </div>

  <script src="/static/js/hearts.js"></script>
</body>
</html>
